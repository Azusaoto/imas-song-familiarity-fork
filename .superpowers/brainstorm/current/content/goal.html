<h2>你想如何改進猜歌系統？</h2>
<p class="subtitle">目前的系統已具備基礎抽題、播放與提示功能</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="modes" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>增加遊戲模式</h3>
      <p>如：計時挑戰、生存模式、連續答題挑戰</p>
    </div>
  </div>
  <div class="option" data-choice="uiux" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>優化 UI/UX 視覺效果</h3>
      <p>現代化介面、更精緻的動畫與回饋</p>
    </div>
  </div>
  <div class="option" data-choice="social" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>社交與排行榜</h3>
      <p>登入存檔、全站排行榜、好友分享分數</p>
    </div>
  </div>
  <div class="option" data-choice="filter" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>增加過濾功能</h3>
      <p>只猜特定品牌 (765/ML/CG/SC/SideM) 或特定樂曲類型</p>
    </div>
  </div>
</div>
