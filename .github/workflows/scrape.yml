name: Daily Scraper

on:
  schedule:
    # 每天 UTC 時間 18:00 (台灣時間凌晨 2:00) 執行一次
    - cron: '0 18 * * *'
  workflow_dispatch: # 允許在 GitHub 網頁上手動點擊執行

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 配合你的 Next.js 環境
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Sync Songs (爬取最新歌曲)
        run: npm run sync:songs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Sync Idol Images (爬取最新偶像圖片與顏色)
        run: npm run sync:idol-images
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
